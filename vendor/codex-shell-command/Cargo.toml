[package]
name = "codex-shell-command"
version = "0.140.0"
edition = "2024"
license = "Apache-2.0"

[dependencies]
base64 = "0.22.1"
codex-protocol = { git = "https://github.com/openai/codex.git", tag = "rust-v0.140.0" }
codex-utils-absolute-path = { git = "https://github.com/openai/codex.git", tag = "rust-v0.140.0" }
libc = "0.2.182"
once_cell = "1.20.2"
regex = "1.12.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
shlex = "1.3.0"
tree-sitter = "0.26.9"
tree-sitter-bash = "0.25"
url = "2"
which = "8"

[dev-dependencies]
anyhow = "1"
pretty_assertions = "1.4.1"

[lib]
doctest = false
